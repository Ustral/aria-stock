# Render blueprint — one free Web Service that serves the API AND the built SPA.
# Deploy: push to GitHub → Render → "New +" → "Blueprint" → pick this repo.
# Then set DATABASE_URL (from Neon) in the service's Environment tab.
services:
  - type: web
    name: aria-stock
    runtime: node
    plan: free
    # --include=dev so Vite (a devDependency) installs even with NODE_ENV=production
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true   # Render generates a strong random secret
      - key: DATABASE_URL
        sync: false           # paste your Neon/Supabase connection string here
